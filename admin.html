<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>슈차각 관리자</title>
<style>
:root{--bg:#0e0f13;--card:#181a20;--card2:#20232c;--line:#2a2e38;--txt:#eef0f4;--sub:#9aa1ad;--red:#e51937;--ok:#22c55e}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;-webkit-font-smoothing:antialiased}
a{color:var(--red)}
.wrap{max-width:760px;margin:0 auto;padding:16px}
header{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--bg);z-index:5}
header .logo{font-weight:800;font-size:18px}
header .logo span{color:var(--red)}
header .sp{flex:1}
button{font-family:inherit;cursor:pointer;border:none;border-radius:9px;font-weight:700}
.btn{background:var(--red);color:#fff;padding:9px 14px;font-size:14px}
.btn.ghost{background:var(--card2);color:var(--txt);border:1px solid var(--line)}
.btn.sm{padding:6px 10px;font-size:13px}
.btn.ok{background:var(--ok);color:#04240f}
.btn.dz{background:#3a1116;color:#ff9aa8;border:1px solid #5a1a22}
input,textarea,select{width:100%;background:var(--card2);border:1px solid var(--line);border-radius:9px;color:var(--txt);padding:9px 11px;font-size:14px;font-family:inherit}
textarea{resize:vertical;min-height:56px}
label{display:block;font-size:12px;color:var(--sub);margin:10px 0 4px}
/* login */
#login{max-width:340px;margin:14vh auto;padding:24px;background:var(--card);border:1px solid var(--line);border-radius:16px;text-align:center}
#login .logo{font-size:26px;font-weight:800;margin-bottom:4px}
#login .logo span{color:var(--red)}
#login .sub{color:var(--sub);font-size:13px;margin-bottom:18px}
#login input{margin-bottom:10px;text-align:left}
#login .btn{width:100%;padding:11px}
.err{color:#ff8a98;font-size:13px;min-height:18px;margin-top:8px}
/* cards */
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0}
.count{color:var(--sub);font-size:13px;align-self:center;margin-left:auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:14px}
.card.dirty{border-color:var(--red)}
.crow{display:flex;gap:12px;align-items:flex-start}
.thumb{width:76px;height:76px;border-radius:10px;background-size:cover;background-position:center;background-color:var(--card2);flex-shrink:0;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:26px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cardhd{display:flex;gap:8px;align-items:center;margin-bottom:10px}
.cardhd .nm{font-weight:700;font-size:15px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pill{font-size:11px;color:var(--sub);background:var(--card2);border:1px solid var(--line);padding:2px 8px;border-radius:20px}
.actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.hint{font-size:12px;color:var(--sub);margin-top:4px}
.uprow{display:flex;gap:8px;align-items:center;margin-top:6px}
.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:#000d;color:#fff;padding:10px 16px;border-radius:20px;font-size:13px;opacity:0;transition:.25s;pointer-events:none;z-index:50}
.toast.show{opacity:1}
.hidden{display:none!important}
.banner{background:#22304a;border:1px solid #33507d;color:#cfe0ff;padding:10px 12px;border-radius:10px;font-size:13px;margin-bottom:12px}
/* tabs + 퍼포먼스 대시보드 */
.tabs{display:flex;gap:8px;margin:14px 0}
.tab{flex:1;background:var(--card2);border:1px solid var(--line);color:var(--sub);padding:10px;font-size:14px;font-weight:700;border-radius:10px}
.tab.active{background:var(--red);border-color:var(--red);color:#fff}
.perftop{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.perftop .count{margin-left:0;flex:1}
.statgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px}
.stat .v{font-size:26px;font-weight:800;line-height:1}
.stat .l{font-size:12px;color:var(--sub);margin-top:6px}
.stat .s{font-size:11px;color:var(--sub);margin-top:6px}
.panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 15px;margin-bottom:14px}
.panel h3{margin:0 0 12px;font-size:14px;display:flex;gap:6px;align-items:center}
.bar{display:flex;align-items:center;gap:10px;margin:8px 0}
.bar .bl{font-size:13px;width:40%;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar .bt{flex:1;background:var(--card2);border-radius:6px;height:18px;overflow:hidden}
.bar .bf{height:100%;background:linear-gradient(90deg,var(--red),#ff7a6a);border-radius:6px;min-width:2px}
.bar .bc{font-size:12px;color:var(--sub);width:52px;text-align:right;flex-shrink:0}
table.ptbl{width:100%;border-collapse:collapse;font-size:13px}
.ptbl th,.ptbl td{padding:8px 5px;border-bottom:1px solid var(--line);text-align:right;white-space:nowrap}
.ptbl th:first-child,.ptbl td:first-child{text-align:left;white-space:normal}
.ptbl th{color:var(--sub);font-weight:600;font-size:11px}
.ptbl .ctr{font-weight:800;color:var(--ok)}
.empty{color:var(--sub);font-size:13px;padding:6px 0}
</style>
</head>
<body>

<!-- 로그인 -->
<div id="login">
  <div class="logo">슈<span>차</span>각 관리자</div>
  <div class="sub">관리자 Google 계정으로 로그인하세요</div>
  <button class="btn" id="gBtn" style="width:100%;padding:11px">Google 계정으로 로그인</button>
  <div class="err" id="lgErr"></div>
</div>

<!-- 관리자 -->
<div id="app" class="hidden">
  <header>
    <div class="logo">슈<span>차</span>각 <span style="color:var(--sub);font-weight:600;font-size:13px">상품 관리</span></div>
    <div class="sp"></div>
    <span class="pill" id="who"></span>
    <button class="btn ghost sm" id="logoutBtn">로그아웃</button>
  </header>
  <div class="wrap">
    <div class="tabs">
      <button class="tab active" id="tabBtnProducts">🛍️ 상품 관리</button>
      <button class="tab" id="tabBtnPerf">📊 퍼포먼스</button>
    </div>

    <div id="tabProducts">
      <div id="storageBanner" class="banner hidden">ℹ️ 사진 업로드(Storage)가 아직 켜져 있지 않아요. 지금은 <b>이미지 URL 붙여넣기</b>로 넣을 수 있고, Storage를 켜면 파일 업로드가 됩니다.</div>
      <div class="toolbar">
        <button class="btn" id="addBtn">＋ 새 상품</button>
        <button class="btn ghost" id="seedBtn">↻ 사이트 상품 동기화</button>
        <span class="count" id="count"></span>
      </div>
      <div id="list"></div>
      <div style="height:60px"></div>
    </div>

    <div id="tabPerf" class="hidden">
      <div class="perftop">
        <span class="count" id="perfMeta">불러오는 중…</span>
        <button class="btn ghost sm" id="perfReload">↻ 새로고침</button>
      </div>
      <div id="perfBody"></div>
      <div style="height:60px"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, setDoc, deleteDoc, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-storage.js";
import { initializeAppCheck, ReCaptchaV3Provider } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app-check.js";

const firebaseConfig = {
  apiKey: "AIzaSyBhEpDS14pcMxYO8tTAAObOQLEFTyjt3gk",
  authDomain: "suchagak.firebaseapp.com",
  projectId: "suchagak",
  storageBucket: "suchagak.firebasestorage.app",
  messagingSenderId: "825619082717",
  appId: "1:825619082717:web:72124990f36bc7bcff1a34"
};
const app = initializeApp(firebaseConfig);
initializeAppCheck(app, { provider: new ReCaptchaV3Provider("6LcbU0stAAAAAMNcqisW5y2oMjUvy7WKfheu6eTs"), isTokenAutoRefreshEnabled: true });
const auth = getAuth(app), db = getFirestore(app), storage = getStorage(app);
const ADMIN_EMAIL = "rain@inspirain.kr";   // 이 계정만 관리 권한

const CAT_META = {
 "수납·정리":["🗄️","#3f51b5"], "매트·플로어":["🧩","#5d4037"], "보호·필름":["🛡️","#00838f"],
 "스마트·전자":["🔌","#8e24aa"], "주행·안전":["🛞","#43a047"], "세차·관리":["🧽","#00acc1"],
 "충전·전력":["⚡","#ff6a00"], "외관·휠":["⚙️","#607d8b"], "기타":["🛍️","#888888"],
};
const CATS = Object.keys(CAT_META);
const MODELS = ["공용","S","X","3","Y","Y주니퍼"];
const MODEL_LABEL = {"공용":"공용","S":"모델 S","X":"모델 X","3":"모델 3","Y":"모델 Y","Y주니퍼":"모델 Y 주니퍼"};
const $ = s=>document.querySelector(s);
let toastT;
function toast(m){ const t=$("#toast"); t.textContent=m; t.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),2200); }
function esc(s){ return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ---------- Auth (Google) ---------- */
const provider = new GoogleAuthProvider();
$("#gBtn").onclick = async ()=>{
  $("#lgErr").textContent="";
  try{ await signInWithPopup(auth, provider); }
  catch(e){ $("#lgErr").textContent = ({'auth/unauthorized-domain':'이 도메인이 아직 승인되지 않았어요(콘솔에서 승인된 도메인에 추가 필요)','auth/popup-closed-by-user':'로그인 창이 닫혔어요','auth/popup-blocked':'팝업이 차단됐어요. 팝업 허용 후 다시 시도하세요'}[e.code]) || ('로그인 실패: '+e.code); }
};
$("#logoutBtn").onclick = ()=>signOut(auth);

onAuthStateChanged(auth, user=>{
  if(user && user.email===ADMIN_EMAIL){
    $("#login").classList.add("hidden"); $("#app").classList.remove("hidden"); $("#who").textContent=user.email; loadProducts();
  } else if(user){
    // 권한 없는 계정 → 즉시 로그아웃
    $("#lgErr").textContent = user.email+" 은(는) 관리 권한이 없어요";
    signOut(auth);
  } else {
    $("#app").classList.add("hidden"); $("#login").classList.remove("hidden");
  }
});

/* ---------- Load & render ---------- */
let items=[]; // {id, data}
async function loadProducts(){
  try{
    const snap = await getDocs(query(collection(db,"products"), orderBy("ord")));
    items = snap.docs.map(d=>({id:d.id, data:d.data()}));
  }catch(e){ toast("불러오기 실패: "+e.code); items=[]; }
  render();
}
function render(){
  $("#count").textContent = items.length+"개 상품";
  $("#list").innerHTML = items.map((it,i)=>cardHTML(it,i)).join('') || '<div class="hint">등록된 상품이 없어요. “↻ 사이트 상품 동기화”로 시작하세요.</div>';
  items.forEach((it,i)=>wireCard(i));
}
function cardHTML(it,i){
  const p=it.data;
  const bg = p.img?`background-image:url('${esc(p.img)}')`:'';
  const catOpts = CATS.map(c=>`<option ${c===p.cat?'selected':''}>${c}</option>`).join('');
  const modelOpts = MODELS.map(m=>`<option value="${m}" ${m===(p.model||'공용')?'selected':''}>${MODEL_LABEL[m]}</option>`).join('');
  return `<div class="card" id="card${i}">
    <div class="cardhd">
      <div class="thumb" id="thumb${i}" style="${bg}">${p.img?'':(p.emoji||'🛍️')}</div>
      <div class="nm" id="nm${i}">${esc(p.name)||'(이름 없음)'}</div>
      <span class="pill">${MODEL_LABEL[p.model||'공용']}</span>
    </div>
    <div class="grid2">
      <div><label>모델 (1차 분류)</label><select data-f="model">${modelOpts}</select></div>
      <div><label>카테고리 (2차 분류)</label><select data-f="cat">${catOpts}</select></div>
    </div>
    <label>순서(작을수록 위)</label><input data-f="ord" type="number" value="${p.ord??i}">
    <label>상품명</label><input data-f="name" value="${esc(p.name)}">
    <label>짧은 설명</label><input data-f="desc" value="${esc(p.desc)}">
    <div class="grid2">
      <div><label>가격 (예: ₩12,900 / 비우면 ‘최저가 확인’)</label><input data-f="price" value="${esc(p.price)}"></div>
      <div><label>구매 링크(어필리에이트)</label><input data-f="url" value="${esc(p.url)}"></div>
    </div>
    <div class="grid2">
      <div><label>쿠폰 코드</label><input data-f="coupon" value="${esc(p.coupon)}"></div>
      <div><label>쿠폰 설명</label><input data-f="couponDesc" value="${esc(p.couponDesc)}"></div>
    </div>
    <label>상세 특징 (한 줄에 하나)</label><textarea data-f="detail">${esc((p.detail||[]).join('\n'))}</textarea>
    <label>이미지</label>
    <input data-f="img" value="${esc(p.img)}" placeholder="이미지 URL 붙여넣기">
    <div class="uprow">
      <input type="file" accept="image/*" id="file${i}" style="font-size:12px">
      <button class="btn ghost sm" data-up="${i}">업로드</button>
    </div>
    <div class="actions">
      <button class="btn ok sm" data-save="${i}">저장</button>
      <button class="btn dz sm" data-del="${i}">삭제</button>
    </div>
  </div>`;
}
function wireCard(i){
  const card=$("#card"+i);
  card.querySelectorAll("[data-f]").forEach(inp=>inp.addEventListener("input",()=>{
    card.classList.add("dirty");
    if(inp.dataset.f==="name") $("#nm"+i).textContent=inp.value||'(이름 없음)';
    if(inp.dataset.f==="img"){ const t=$("#thumb"+i); if(inp.value){ t.style.backgroundImage=`url('${inp.value}')`; t.textContent=''; } else { t.style.backgroundImage=''; } }
  }));
  card.querySelector("[data-save]").onclick=()=>saveCard(i);
  card.querySelector("[data-del]").onclick=()=>delCard(i);
  card.querySelector("[data-up]").onclick=()=>uploadImg(i);
}
function readCard(i){
  const card=$("#card"+i), o={};
  card.querySelectorAll("[data-f]").forEach(inp=>o[inp.dataset.f]=inp.value.trim());
  o.ord = parseInt(o.ord)||0;
  o.detail = (o.detail||'').split('\n').map(s=>s.trim()).filter(Boolean);
  const [emoji,color]=CAT_META[o.cat]||CAT_META["기타"];
  o.emoji=emoji; o.color=color; o.platform=items[i].data.platform||"알리익스프레스";
  o.id=items[i].id;
  return o;
}
async function saveCard(i){
  const o=readCard(i);
  if(!o.name){ toast("상품명을 입력하세요"); return; }
  try{ await setDoc(doc(db,"products",items[i].id), o); items[i].data=o; $("#card"+i).classList.remove("dirty"); toast("저장됨 · "+o.name); }
  catch(e){ toast("저장 실패: "+e.code); }
}
async function delCard(i){
  if(!confirm(`"${items[i].data.name}" 상품을 삭제할까요?`)) return;
  try{ await deleteDoc(doc(db,"products",items[i].id)); toast("삭제됨"); loadProducts(); }
  catch(e){ toast("삭제 실패: "+e.code); }
}
async function uploadImg(i){
  const f=$("#file"+i).files[0];
  if(!f){ toast("파일을 선택하세요"); return; }
  toast("업로드 중…");
  try{
    const r=ref(storage,`products/${items[i].id}/${Date.now()}_${f.name}`);
    await uploadBytes(r,f);
    const url=await getDownloadURL(r);
    const inp=$("#card"+i).querySelector('[data-f="img"]'); inp.value=url;
    inp.dispatchEvent(new Event("input"));
    toast("업로드 완료 · 저장 눌러 반영하세요");
  }catch(e){
    if(String(e.code||e).includes("storage")){ $("#storageBanner").classList.remove("hidden"); toast("Storage 미설정 · URL 붙여넣기를 이용하세요"); }
    else toast("업로드 실패: "+(e.code||e.message));
  }
}
/* ---------- Add / Seed ---------- */
$("#addBtn").onclick=()=>{
  const id="p"+Date.now();
  const maxOrd=items.reduce((m,it)=>Math.max(m,it.data.ord||0),0);
  items.push({id,data:{id,cat:"기타",name:"",desc:"",price:"",url:"#",coupon:"",couponDesc:"",detail:[],img:"",emoji:"🛍️",color:"#888",platform:"알리익스프레스",ord:maxOrd+1}});
  render();
  const c=$("#card"+(items.length-1)); c.scrollIntoView({behavior:"smooth"}); c.classList.add("dirty");
};
$("#seedBtn").onclick=async ()=>{
  if(!confirm("사이트 내장 상품으로 DB를 동기화할까요?\n· 새 상품 추가 + 기존 상품 업데이트(모델 분류 포함)\n· 직접 입력한 가격/쿠폰은 그대로 유지됩니다")) return;
  toast("동기화 중…");
  try{
    const existing={}; items.forEach(it=>existing[it.id]=it.data||{});
    const html=await (await fetch("/index.html?"+Date.now())).text();
    const s=html.indexOf("PRODUCTS="); if(s<0) throw new Error("상품 데이터를 찾지 못했어요");
    let j=html.indexOf("[",s), depth=0, e=-1, inStr=false, esc2=false;
    for(let k=j;k<html.length;k++){ const ch=html[k];
      if(inStr){ if(esc2)esc2=false; else if(ch==="\\")esc2=true; else if(ch==='"')inStr=false; }
      else{ if(ch==='"')inStr=true; else if(ch==="[")depth++; else if(ch==="]"){ depth--; if(depth===0){e=k;break;} } } }
    const arr=JSON.parse(html.slice(j,e+1));
    let n=0;
    for(let k=0;k<arr.length;k++){ const p=arr[k]; const ex=existing[p.id]||{};
      const [emoji,color]=CAT_META[p.cat]||CAT_META["기타"];
      await setDoc(doc(db,"products",p.id),{ id:p.id, cat:p.cat, name:p.name, model:p.model||"공용", brand:p.brand||"",
        price:(ex.price||p.price||""), platform:p.platform||"알리익스프레스", emoji:p.emoji||emoji, color:p.color||color, img:p.img||"",
        desc:p.desc||"", detail:Array.isArray(p.detail)?p.detail:[], url:p.url||"#",
        coupon:(ex.coupon||p.coupon||""), couponDesc:(ex.couponDesc||p.couponDesc||""), ord:k });
      n++;
    }
    toast(n+"개 동기화 완료!"); loadProducts();
  }catch(e){ toast("동기화 실패: "+(e.code||e.message)); }
};

/* ---------- 탭 전환 ---------- */
let perfLoaded=false;
function showTab(which){
  const isP=which==='perf';
  $("#tabProducts").classList.toggle("hidden",isP);
  $("#tabPerf").classList.toggle("hidden",!isP);
  $("#tabBtnProducts").classList.toggle("active",!isP);
  $("#tabBtnPerf").classList.toggle("active",isP);
  if(isP && !perfLoaded){ perfLoaded=true; loadPerf(); }
}
$("#tabBtnProducts").onclick=()=>showTab('products');
$("#tabBtnPerf").onclick=()=>showTab('perf');
$("#perfReload").onclick=()=>loadPerf();

/* ---------- 퍼포먼스 대시보드 ---------- */
function tsMs(e){ const t=e.ts; if(!t) return null; if(typeof t.toDate==='function') return t.toDate().getTime(); if(t.seconds) return t.seconds*1000; return null; }
function groupTop(arr,keyFn,n){
  const m=new Map();
  arr.forEach(e=>{ const k=keyFn(e); if(k==null||k==='') return; m.set(k,(m.get(k)||0)+1); });
  return [...m.entries()].map(([label,count])=>({label,count})).sort((a,b)=>b.count-a.count).slice(0,n);
}
function barList(entries){
  if(!entries.length) return '<div class="empty">아직 데이터가 없어요</div>';
  const max=entries[0].count||1;
  return entries.map(e=>`<div class="bar"><div class="bl">${esc(String(e.label))}</div>
    <div class="bt"><div class="bf" style="width:${Math.round(e.count/max*100)}%"></div></div>
    <div class="bc">${e.count}</div></div>`).join('');
}
async function loadPerf(){
  $("#perfMeta").textContent='불러오는 중…';
  $("#perfBody").innerHTML='<div class="hint">이벤트 집계 중…</div>';
  let evs=[];
  try{
    const snap=await getDocs(collection(db,"events"));   // 전체 이벤트 집계 (저장은 무제한)
    evs=snap.docs.map(d=>d.data());
  }catch(e){
    $("#perfMeta").textContent='';
    $("#perfBody").innerHTML='<div class="banner">이벤트를 불러오지 못했어요: '+(e.code||e.message)+'<br>Firestore 보안 규칙에 <b>events</b> 읽기 권한(관리자)이 있는지 확인하세요.</div>';
    return;
  }
  renderPerf(evs);
}
function renderPerf(evs){
  const now=Date.now(), DAY=864e5;
  const t0=new Date(); t0.setHours(0,0,0,0); const todayMs=t0.getTime();
  const pv=evs.filter(e=>e.t==='pageview');
  const uniq=new Set(pv.map(e=>e.cid).filter(Boolean)).size;
  const pvToday=pv.filter(e=>{const m=tsMs(e); return m&&m>=todayMs;}).length;
  const pv7=pv.filter(e=>{const m=tsMs(e); return m&&m>=now-7*DAY;}).length;
  const navs=evs.filter(e=>e.t==='nav');
  const searches=evs.filter(e=>e.t==='search');
  const geos=evs.filter(e=>e.t==='geo');
  const pViews=evs.filter(e=>e.t==='product_view');
  const pClicks=evs.filter(e=>e.t==='product_click');

  const navApp=groupTop(navs,e=>({tmap:'티맵',kakao:'카카오맵',naver:'네이버맵',tesla:'테슬라'}[e.app]||e.app),5);
  const navTop=groupTop(navs,e=>e.title,8);
  const searchTop=groupTop(searches,e=>String(e.q||'').trim().toLowerCase(),12);
  const regionTop=groupTop(geos,e=>e.region,12);

  const vmap=new Map(), cmap=new Map(), nameMap=new Map();
  pViews.forEach(e=>{ vmap.set(e.id,(vmap.get(e.id)||0)+1); if(e.name)nameMap.set(e.id,e.name); });
  pClicks.forEach(e=>{ cmap.set(e.id,(cmap.get(e.id)||0)+1); if(e.name)nameMap.set(e.id,e.name); });
  const ids=new Set([...vmap.keys(),...cmap.keys()]);
  const prodRows=[...ids].map(id=>{ const v=vmap.get(id)||0,c=cmap.get(id)||0; return {name:nameMap.get(id)||id,views:v,clicks:c,ctr:v?c/v*100:0}; })
    .sort((a,b)=>b.clicks-a.clicks||b.views-a.views).slice(0,30);

  $("#perfMeta").textContent=`전체 이벤트 ${evs.length.toLocaleString()}건 집계`;
  $("#perfBody").innerHTML=`
    <div class="statgrid">
      <div class="stat"><div class="v">${pv.length.toLocaleString()}</div><div class="l">총 방문(페이지뷰)</div><div class="s">오늘 ${pvToday} · 최근7일 ${pv7}</div></div>
      <div class="stat"><div class="v">${uniq.toLocaleString()}</div><div class="l">순 방문자(기기 기준)</div><div class="s">브라우저 로컬 식별</div></div>
      <div class="stat"><div class="v">${navs.length.toLocaleString()}</div><div class="l">길안내 실행</div><div class="s">전체 네비 클릭</div></div>
      <div class="stat"><div class="v">${pClicks.length.toLocaleString()}</div><div class="l">상점 링크 클릭</div><div class="s">상품 조회 ${pViews.length}</div></div>
    </div>
    <div class="panel"><h3>🧭 많이 쓰는 길안내 앱</h3>${barList(navApp)}</div>
    <div class="panel"><h3>📍 위치기반 유저 지역 분포</h3>${barList(regionTop)}</div>
    <div class="panel"><h3>🔎 인기 검색어</h3>${barList(searchTop)}</div>
    <div class="panel"><h3>🚗 길안내 많이 찍는 충전소 TOP</h3>${barList(navTop)}</div>
    <div class="panel"><h3>🛍️ 상점 링크 클릭률(CTR)</h3>
      ${prodRows.length?`<table class="ptbl"><thead><tr><th>상품</th><th>조회</th><th>클릭</th><th>CTR</th></tr></thead><tbody>
        ${prodRows.map(r=>`<tr><td>${esc(r.name)}</td><td>${r.views}</td><td>${r.clicks}</td><td class="ctr">${r.views?r.ctr.toFixed(0)+'%':'-'}</td></tr>`).join('')}
      </tbody></table>`:'<div class="empty">아직 데이터가 없어요</div>'}
    </div>`;
}
</script>
</body>
