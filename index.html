<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#111114">
<title>테슬라 슈퍼차저 맵</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root{
  --bg:#0c0c0f; --bg2:#15151a; --card:#1a1a20; --card2:#22222a;
  --line:#2a2a33; --txt:#f2f2f5; --muted:#9a9aa6; --muted2:#6f6f7a;
  --red:#E82127; --red2:#ff3b41; --gold:#ffb300; --green:#37c86b; --blue:#3b9dff;
  --shadow:0 6px 24px rgba(0,0,0,.45);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",Roboto,sans-serif;
  overscroll-behavior:none}
body{padding-bottom:env(safe-area-inset-bottom)}
#app{position:relative;width:100%;min-height:100vh;background:var(--bg)}
#scroll{width:100%}
/* PC: 모바일 화면을 가운데 폰 프레임으로 (오버레이는 프레임 뷰포트에 고정) */
@media (min-width:600px){
  html{background:#050506}
  body{padding-bottom:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(1100px 760px at 50% -5%, #17171e, #050506 62%)}
  #app{width:412px;max-width:412px;height:90vh;max-height:920px;min-height:0;
    overflow:hidden;border-radius:36px;
    box-shadow:0 0 0 2px #1c1c22, 0 0 0 12px #0c0c0f, 0 0 0 13px #2a2a33, 0 40px 100px rgba(0,0,0,.75);
    transform:translateZ(0)}
  #scroll{height:100%;overflow-y:auto;overflow-x:hidden}
  #scroll::-webkit-scrollbar{width:0;height:0}
  #map{height:calc(90vh - 210px);max-height:710px}
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:0;height:0}

/* ---- Header ---- */
header{position:sticky;top:0;z-index:600;background:rgba(12,12,15,.92);
  backdrop-filter:blur(12px);border-bottom:1px solid var(--line);
  padding:calc(env(safe-area-inset-top) + 10px) 14px 8px}
.brand{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.brand .logo{height:22px;width:auto;display:block;filter:drop-shadow(0 1px 3px rgba(232,33,39,.35))}
.brand h1{font-size:16px;font-weight:800;letter-spacing:.3px;margin:0;flex:1}
.brand .count{font-size:11px;color:var(--muted);font-weight:600}
.searchrow{display:flex;gap:8px;align-items:center}
.searchbox{flex:1;display:flex;align-items:center;gap:8px;background:var(--card2);
  border:1px solid var(--line);border-radius:12px;padding:9px 12px}
.searchbox input{flex:1;background:none;border:none;outline:none;color:var(--txt);
  font-size:14px;min-width:0}
.searchbox svg{width:16px;height:16px;color:var(--muted);flex-shrink:0}
.geo-btn{background:var(--red);border-radius:12px;padding:0 13px;height:38px;
  display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;flex-shrink:0}
.geo-btn svg{width:15px;height:15px}
.geo-btn.on{background:var(--green)}

/* ---- Filters ---- */
.filters{display:flex;gap:7px;overflow-x:auto;padding:10px 0 2px;scrollbar-width:none}
.chip{white-space:nowrap;background:var(--card2);border:1px solid var(--line);
  border-radius:20px;padding:7px 13px;font-size:12.5px;font-weight:600;color:var(--muted);
  display:flex;align-items:center;gap:5px}
.chip.active{background:var(--red);border-color:var(--red);color:#fff}
.chip.sort.active{background:var(--blue);border-color:var(--blue)}
.chip.free.active{background:var(--green);border-color:var(--green)}
.chip select{background:none;border:none;color:inherit;font-weight:700;font-size:12.5px;outline:none}
.chip svg{width:13px;height:13px}

/* ---- Tabs ---- */
.tabs{display:flex;background:var(--card);border-radius:12px;padding:4px;margin:10px 14px 0;
  border:1px solid var(--line)}
.tab{flex:1;text-align:center;padding:9px;border-radius:9px;font-size:13.5px;font-weight:700;
  color:var(--muted)}
.tab.active{background:var(--red);color:#fff}

/* ---- List ---- */
main{padding:12px 14px 30px}
.summary{font-size:12px;color:var(--muted);margin:2px 4px 12px;display:flex;
  justify-content:space-between;align-items:center}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:14px;margin-bottom:11px;position:relative;overflow:hidden}
.card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--barcol,var(--muted2))}
.card .top{display:flex;gap:12px;align-items:flex-start}
.rankbadge{flex-shrink:0;width:30px;height:30px;border-radius:9px;background:var(--card2);
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--muted)}
.rankbadge.top{background:linear-gradient(135deg,var(--gold),#ff8a00);color:#1a1a20}
.cardmain{flex:1;min-width:0}
.cname{font-size:15.5px;font-weight:800;line-height:1.25;margin:0 0 3px}
.cmeta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;font-size:11.5px;color:var(--muted)}
.pill{background:var(--card2);border-radius:6px;padding:2px 7px;font-weight:600;font-size:11px}
.pill.kw250{color:#ff6b70}.pill.kw120{color:var(--blue)}.pill.kwmix{color:var(--gold)}
.pill.free{color:var(--green);background:rgba(55,200,107,.12)}
.pill.dist{color:var(--red2);background:rgba(232,33,39,.12)}
.scorebox{flex-shrink:0;text-align:center;min-width:54px}
.scorebig{font-size:24px;font-weight:800;line-height:1;letter-spacing:-.5px}
.scoregrade{font-size:34px;font-weight:900;line-height:.9;letter-spacing:-1px}
.scorelbl{font-size:10px;color:var(--muted2);font-weight:700;margin-top:4px;letter-spacing:.3px}
.bars{display:flex;gap:5px;margin-top:11px}
.barunit{flex:1;text-align:center}
.barunit .bt{font-size:9px;color:var(--muted2);margin-bottom:3px;font-weight:600}
.bartrack{height:4px;background:var(--card2);border-radius:3px;overflow:hidden}
.barfill{height:100%;border-radius:3px}
.barunit .bv{font-size:10px;color:var(--muted);margin-top:3px;font-weight:700}
.cardbtns{display:flex;gap:8px;margin-top:12px}
.cardbtns button,.cardbtns a{flex:1;text-align:center;padding:9px;border-radius:10px;
  font-size:13px;font-weight:700}
.btn-detail{background:var(--card2);border:1px solid var(--line);color:var(--txt)}
.btn-nav{background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;gap:5px}
.btn-nav svg{width:14px;height:14px;flex-shrink:0}
.desc{font-size:11.5px;color:var(--muted);line-height:1.45;margin-top:9px;
  padding-top:9px;border-top:1px solid var(--line)}

/* ---- Map ---- */
#map{width:100%;height:calc(100vh - 210px);border-radius:0}
.leaflet-container{background:#0c0c0f;font-family:inherit}
.leaflet-popup-content-wrapper{background:var(--card);color:var(--txt);border-radius:12px;
  border:1px solid var(--line)}
.leaflet-popup-tip{background:var(--card);border:1px solid var(--line)}
.leaflet-popup-content{margin:12px 14px}
.pop-name{font-size:14px;font-weight:800;margin-bottom:4px}
.pop-meta{font-size:11px;color:var(--muted);margin-bottom:9px}
.pop-btns{display:flex;gap:7px}
.pop-btns button,.pop-btns a{padding:7px 10px;border-radius:8px;font-size:12px;font-weight:700;text-align:center}
.marker-dot{border-radius:50%;border:2px solid #fff;box-shadow:0 1px 5px rgba(0,0,0,.6);
  display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff}
.me-dot{width:18px;height:18px;border-radius:50%;background:var(--blue);border:3px solid #fff;
  box-shadow:0 0 0 6px rgba(59,157,255,.25)}

/* ---- Detail sheet ---- */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;opacity:0;
  pointer-events:none;transition:opacity .25s}
.overlay.show{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;max-height:92vh;background:var(--bg2);
  border-radius:22px 22px 0 0;z-index:1001;transform:translateY(100%);
  transition:transform .3s cubic-bezier(.2,.8,.2,1);overflow-y:auto;
  padding-bottom:calc(env(safe-area-inset-bottom) + 20px)}
.sheet.show{transform:translateY(0)}
.grabber{width:40px;height:4px;background:var(--line);border-radius:3px;margin:10px auto 4px}
.sheet-hd{padding:6px 18px 14px;position:sticky;top:0;background:var(--bg2);z-index:2}
.sheet-hd .close{position:absolute;right:14px;top:6px;width:32px;height:32px;border-radius:50%;
  background:var(--card2);font-size:18px;color:var(--muted)}
.sheet h2{font-size:19px;font-weight:800;margin:4px 0 6px;padding-right:34px;line-height:1.25}
.sheet .sub{font-size:12px;color:var(--muted);display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.sheet-body{padding:0 18px}
.section{margin-top:20px}
.section h3{font-size:12px;font-weight:800;color:var(--muted);letter-spacing:.5px;
  margin:0 0 10px;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.section h3 svg{width:14px;height:14px;color:var(--red2)}
.totalrow{display:flex;align-items:center;gap:16px;background:var(--card);border-radius:16px;
  padding:16px;border:1px solid var(--line)}
.totalrow .bigwrap{text-align:center;min-width:56px}
.totalrow .big{font-size:52px;font-weight:900;line-height:.85;letter-spacing:-2px}
.totalrow .bignum{font-size:14px;color:var(--muted);font-weight:800;margin-top:6px}
.totalrow .bignum small{font-size:11px;color:var(--muted2);font-weight:700}
.totalrow .stars{font-size:13px;color:var(--gold);letter-spacing:1px}
.totalrow .rk{font-size:11px;color:var(--muted);margin-top:4px}
.radar{display:flex;flex-direction:column;gap:11px;background:var(--card);border-radius:16px;
  padding:16px;border:1px solid var(--line)}
.rrow{display:flex;align-items:center;gap:10px}
.rrow .rl{font-size:12px;font-weight:700;width:82px;flex-shrink:0;color:var(--muted)}
.rrow .rt{flex:1;height:7px;background:var(--card2);border-radius:4px;overflow:hidden}
.rrow .rf{height:100%;border-radius:4px}
.rrow .rv{font-size:12px;font-weight:800;width:30px;text-align:right}
.infogrid{display:grid;grid-template-columns:1fr;gap:10px}
.infoitem{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
.infoitem .il{font-size:11px;color:var(--muted2);font-weight:700;margin-bottom:4px}
.infoitem .iv{font-size:13.5px;line-height:1.5;white-space:pre-line}
.factbox{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px}
.factsummary{font-size:13px;font-weight:700;line-height:1.6;color:var(--txt);
  padding:11px 12px;background:var(--card2);border-radius:10px}
.amchips{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px}
.amchip{font-size:11.5px;font-weight:600;background:rgba(55,200,107,.12);color:#5fd98a;
  border:1px solid rgba(55,200,107,.25);border-radius:8px;padding:4px 9px}
.feelrow{display:flex;align-items:center;gap:10px;margin-top:13px;padding-top:13px;border-top:1px solid var(--line)}
.feellbl{font-size:12px;font-weight:700;color:var(--muted);flex-shrink:0}
.feellbl em{font-style:normal;font-size:9px;font-weight:800;background:var(--card2);color:var(--muted2);
  padding:2px 6px;border-radius:5px;margin-left:4px;letter-spacing:.3px}
.feelbar{flex:1;height:7px;background:var(--card2);border-radius:4px;overflow:hidden}
.feelbar>div{height:100%;border-radius:4px}
.feelv{font-size:12px;font-weight:800;width:26px;text-align:right}
.factnote{font-size:10.5px;color:var(--muted2);line-height:1.55;margin-top:12px}
.factnote b{color:var(--muted)}
.paylist,.freelist{margin:6px 0 0;padding:0;list-style:none}
.paylist li,.freelist li{font-size:13px;line-height:1.65;padding-left:18px;position:relative;color:var(--txt)}
.paylist li::before{content:"⏱";position:absolute;left:0;font-size:11px;opacity:.75}
.freelist li::before{content:"✓";position:absolute;left:1px;color:var(--green);font-weight:800}
.freehead{font-size:11.5px;font-weight:800;color:var(--green);margin-top:11px}
.freebig{font-size:14px;font-weight:800;color:var(--green);margin-top:2px}
.spon-top.nochev{cursor:default}
.shopchips{display:flex;flex-wrap:wrap;gap:7px;padding:0 14px 14px}
.shopchip{font-size:12px;font-weight:700;background:var(--card2);border:1px solid var(--line);
  border-radius:9px;padding:6px 10px;color:var(--txt)}
.shopnote{padding:0 14px 14px;font-size:12px;color:var(--muted2)}
.videos{display:flex;flex-direction:column;gap:14px}
.vwrap .vlabel{font-size:12.5px;font-weight:700;margin-bottom:7px;display:flex;align-items:center;gap:6px}
.vlabel .vtag{background:var(--red);color:#fff;font-size:9px;padding:2px 6px;border-radius:5px;font-weight:800}
.vframe{position:relative;width:100%;padding-top:56.25%;border-radius:12px;overflow:hidden;
  background:#000;border:1px solid var(--line)}
.vframe iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.vthumb{position:absolute;inset:0;background-size:cover;background-position:center;
  display:flex;align-items:center;justify-content:center}
.vthumb .play{width:54px;height:54px;border-radius:50%;background:rgba(232,33,39,.92);
  display:flex;align-items:center;justify-content:center}
.vthumb .play svg{width:22px;height:22px;color:#fff;margin-left:3px}
.sheet-nav{position:sticky;bottom:0;background:linear-gradient(transparent,var(--bg2) 24%);
  padding:16px 18px calc(env(safe-area-inset-bottom) + 8px);margin-top:14px}
.tmap-big{width:100%;padding:15px;border-radius:14px;background:var(--red);color:#fff;
  font-size:15.5px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:8px}
.tmap-big svg{width:19px;height:19px}
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty svg{width:44px;height:44px;opacity:.4;margin-bottom:12px}
.toast{position:fixed;bottom:calc(env(safe-area-inset-bottom) + 20px);left:50%;
  transform:translateX(-50%) translateY(20px);background:var(--card2);border:1px solid var(--line);
  color:var(--txt);padding:11px 18px;border-radius:24px;font-size:13px;font-weight:600;z-index:2000;
  opacity:0;transition:.3s;box-shadow:var(--shadow);max-width:88vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.geonote{font-size:9.5px;color:var(--muted2);margin-left:4px}

/* ---- Nav app chooser ---- */
.navsheet{position:fixed;left:0;right:0;bottom:0;background:var(--bg2);z-index:1101;
  border-radius:22px 22px 0 0;transform:translateY(100%);transition:transform .3s cubic-bezier(.2,.8,.2,1);
  padding:6px 16px calc(env(safe-area-inset-bottom) + 16px);box-shadow:var(--shadow)}
.navsheet.show{transform:translateY(0)}
#navOverlay{z-index:1100}
.navsheet .grabber{margin:8px auto 10px}
.ns-title{text-align:center;font-size:14.5px;font-weight:800;padding:2px 0 15px}
.ns-sub{font-size:12px;color:var(--muted);font-weight:600;margin-top:4px}
.ns-row{display:flex;gap:10px;margin-bottom:10px}
.navopt{flex:1;display:flex;flex-direction:column;align-items:center;gap:10px;padding:16px 6px;border-radius:15px;
  background:var(--card);border:1px solid var(--line);font-size:13px;font-weight:700;color:var(--txt)}
.navopt:active{transform:scale(.96)}
.navopt .ni{width:52px;height:52px;border-radius:14px;display:block}
.navopt.cancel{width:100%;padding:14px;background:var(--card2);color:var(--muted);font-weight:700}

/* ---- Detail nav row ---- */
.navlabel{font-size:12px;font-weight:800;color:var(--muted);letter-spacing:.5px;margin-bottom:10px;
  display:flex;align-items:center;gap:6px;text-transform:uppercase}
.navlabel svg{width:15px;height:15px;color:var(--red2)}
.navrow{display:flex;gap:8px}
.navbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;padding:13px 4px;
  border-radius:13px;background:var(--card);border:1px solid var(--line);font-size:12.5px;font-weight:800;color:var(--txt)}
.navbtn .ni{width:34px;height:34px;border-radius:9px;display:block}
.navbtn:active{transform:scale(.96)}

/* ---- Footer ---- */
#footer{padding:28px 22px calc(env(safe-area-inset-bottom) + 34px);border-top:1px solid var(--line);
  margin-top:8px;background:var(--bg2)}
.ft-brand{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:15px}
.ft-logo{height:30px;width:auto;opacity:.95}
.ft-title{font-size:14px;font-weight:800}
.ft-by{font-size:11.5px;color:var(--muted);margin-top:3px}
.ft-by b{color:var(--red2)}
.ft-copy{font-size:10.5px;color:var(--muted2);margin-top:15px;text-align:center;line-height:1.6}

/* ---- Shop open button ---- */
.shop-open{display:flex;align-items:center;gap:5px;background:var(--card2);border:1px solid var(--line);
  border-radius:11px;padding:7px 11px;font-size:12.5px;font-weight:700;color:var(--txt);flex-shrink:0}
.shop-open svg{width:15px;height:15px;color:var(--red2)}
.shop-open:active{transform:scale(.96)}

/* ---- Sponsor slot ---- */
.spon-card{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;position:relative}
.spon-card::after{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(var(--gold),#ff8a00)}
.spon-top{display:flex;align-items:center;gap:12px;padding:13px 14px 13px 16px;cursor:pointer}
.spon-thumb{width:52px;height:52px;border-radius:12px;flex-shrink:0;background-size:cover;background-position:center;
  display:flex;align-items:center;justify-content:center;font-size:26px}
.spon-info{flex:1;min-width:0}
.spon-name{font-size:14.5px;font-weight:800;display:flex;align-items:center;gap:6px}
.spon-name .ad{font-size:8.5px;font-weight:800;background:var(--gold);color:#1a1a20;padding:1px 5px;border-radius:4px;letter-spacing:.5px}
.spon-cat{font-size:11.5px;color:var(--muted);margin:2px 0 5px}
.spon-benefit{font-size:12px;color:var(--gold);font-weight:600;line-height:1.35}
.spon-chev{color:var(--muted2);font-size:22px;transition:transform .25s;flex-shrink:0}
.spon-card.open .spon-chev{transform:rotate(90deg)}
.spon-detail{max-height:0;overflow:hidden;transition:max-height .3s ease;padding:0 16px}
.spon-card.open .spon-detail{max-height:420px;padding:0 16px 14px}
.spon-drow{display:flex;gap:10px;font-size:12.5px;padding:8px 0;border-top:1px solid var(--line);line-height:1.5}
.spon-drow b{color:var(--muted2);font-weight:700;width:38px;flex-shrink:0}
.spon-drow>span{flex:1;color:var(--txt)}
.spon-menus{display:flex;flex-wrap:wrap;gap:5px}
.spon-menu{background:var(--card2);border-radius:6px;padding:3px 8px;font-size:11px;color:var(--muted)}
.spon-link{display:inline-block;margin-top:10px;background:var(--card2);border:1px solid var(--line);
  border-radius:9px;padding:9px 14px;font-size:12.5px;font-weight:700;color:var(--red2)}
.spon-card:not(.paid)::after{background:linear-gradient(#3b9dff,#2666a8)}
.spon-benefit.fac{color:var(--muted);font-weight:600}

/* ---- Shop overlay ---- */
.shop{position:fixed;inset:0;z-index:1200;background:var(--bg);overflow-y:auto;
  transform:translateX(100%);transition:transform .3s cubic-bezier(.2,.8,.2,1);
  padding-bottom:calc(env(safe-area-inset-bottom) + 100px)}
.shop.show{transform:translateX(0)}
.shop-hd{position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:10px;
  padding:calc(env(safe-area-inset-top) + 12px) 14px 12px;background:rgba(12,12,15,.92);
  backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.shop-title{flex:1;font-size:16px;font-weight:800;text-align:center}
.shop-close,.shop-back{background:var(--card2);border:1px solid var(--line);border-radius:10px;
  min-width:36px;height:34px;padding:0 11px;font-size:16px;font-weight:700;color:var(--txt)}
.shop-back{font-size:13px;color:var(--muted)}
.shop-note{font-size:11px;color:var(--muted2);text-align:center;padding:13px 18px 2px}
.shop-cats{display:flex;gap:7px;overflow-x:auto;padding:12px 14px 4px;scrollbar-width:none}
.scat{white-space:nowrap;background:var(--card2);border:1px solid var(--line);border-radius:18px;
  padding:7px 13px;font-size:12.5px;font-weight:700;color:var(--muted)}
.scat.active{background:var(--red);border-color:var(--red);color:#fff}
.shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;padding:8px 14px}
.prod-card{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden}
.prod-card:active{transform:scale(.97)}
.prod-thumb{position:relative;width:100%;padding-top:76%;display:flex;align-items:center;justify-content:center;
  background-size:cover;background-position:center}
.prod-thumb>span:first-child{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:44px}
.plat{position:absolute;left:8px;top:8px;font-size:9.5px;font-weight:800;color:#fff;padding:3px 7px;border-radius:6px;background:rgba(0,0,0,.55)}
.plat.coupang{background:#ff5a5f}.plat.ali{background:#e63946}.plat.naver{background:#03C75A}
.plat.jouwa{background:#111;border:1px solid #ffd700;color:#ffd700}.plat.mall{background:#555}
.prod-b{padding:10px 11px 12px}
.prod-name{font-size:12.5px;font-weight:700;line-height:1.35;height:34px;overflow:hidden}
.prod-price{font-size:14px;font-weight:800;margin-top:5px}
.prod-detail{padding:16px}
.pd-thumb{width:100%;padding-top:60%;position:relative;border-radius:16px;background-size:cover;background-position:center;
  border:1px solid var(--line)}
.pd-thumb>span{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:76px}
.pd-plat{display:flex;align-items:center;gap:8px;margin-top:14px}
.pd-plat .plat{position:static}
.pd-cat{font-size:11.5px;color:var(--muted)}
.pd-name{font-size:19px;font-weight:800;margin-top:10px;line-height:1.3}
.pd-brand{font-size:12.5px;color:var(--muted);margin-top:4px}
.pd-price{font-size:24px;font-weight:800;margin-top:10px}
.pd-desc{font-size:13.5px;color:var(--muted);line-height:1.6;margin-top:12px}
.pd-sec{font-size:12px;font-weight:800;color:var(--muted);letter-spacing:.5px;margin-top:20px}
.pd-feats{margin:10px 0 0;padding-left:18px}
.pd-feats li{font-size:13.5px;line-height:1.75;color:var(--txt)}
.pd-buy{position:fixed;left:0;right:0;bottom:0;padding:14px 16px calc(env(safe-area-inset-bottom) + 14px);
  background:linear-gradient(transparent,var(--bg) 24%)}
.pd-buybtn{display:block;width:100%;text-align:center;background:var(--red);color:#fff;border-radius:14px;
  padding:15px;font-size:15.5px;font-weight:800}
.pd-buybtn.disabled{background:var(--card2);color:var(--muted);border:1px solid var(--line)}
</style>
</head>

<script>
/* ============ State ============ */
const S = { region:"", sort:"total", kw:new Set(), free:false, val:0, q:"", me:null, view:"list" };
const $ = s => document.querySelector(s);
const el = (t,c,h)=>{const e=document.createElement(t); if(c)e.className=c; if(h!=null)e.innerHTML=h; return e;};

/* ============ Helpers ============ */
function starStr(t){ // t out of 10 -> 5 stars
  const v = t/2, full=Math.floor(v), half=v-full>=.5;
  return "★".repeat(full)+(half?"⯨":"")+"☆".repeat(5-full-(half?1:0));
}
function scoreColor(v){ // 0-10
  if(v>=8.5) return "#37c86b";
  if(v>=7) return "#8bd63a";
  if(v>=5.5) return "#ffb300";
  if(v>=4) return "#ff8a3d";
  return "#ff5257";
}
function gradeOf(t){ return t==null?'-':t>=8.0?'A':t>=6.8?'B':t>=5.8?'C':t>=5.0?'D':'E'; }
function gradeColor(t){ if(t==null)return '#888';
  return t>=8.0?'#37c86b':t>=6.8?'#8bd63a':t>=5.8?'#ffb300':t>=5.0?'#ff8a3d':'#ff5257'; }
function kwClass(t){ return t==='mix'?'kwmix':(t==='120'?'kw120':'kw250'); }
function kwLabel(c){ return c.speed || (c.kwTier==='mix'?'250+120kW':c.kwTier+'kW'); }
function haversine(a,b,c,d){ const R=6371,r=Math.PI/180;
  const dl=(c-a)*r, dg=(d-b)*r, x=Math.sin(dl/2)**2+Math.cos(a*r)*Math.cos(c*r)*Math.sin(dg/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)); }
function fmtDist(km){ return km<1?Math.round(km*1000)+"m":(km<10?km.toFixed(1):Math.round(km))+"km"; }
function tmapUrl(c){
  const n=encodeURIComponent(c.name);
  return `tmap://route?goalname=${n}&goalx=${c.lng}&goaly=${c.lat}&rGoName=${n}&rGoX=${c.lng}&rGoY=${c.lat}`;
}
function toast(m){ const t=$("#toast"); t.textContent=m; t.classList.add("show");
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),2200); }

/* ============ Filtering ============ */
function filtered(){
  let r = DATA.slice();
  if(S.region) r=r.filter(c=>c.region===S.region);
  if(S.kw.size) r=r.filter(c=>S.kw.has(c.kwTier)||(c.kwTier==='mix'));
  if(S.free) r=r.filter(c=>c.isFree);
  if(S.val) r=r.filter(c=>(c.cost||0)>=S.val);
  if(S.q){ const q=S.q.toLowerCase();
    r=r.filter(c=>(c.name+c.title+c.facility+c.region+c.summary+c.misc).toLowerCase().includes(q)); }
  if(S.me) r.forEach(c=> c._d = c.lat? haversine(S.me[0],S.me[1],c.lat,c.lng):null);
  const sort=S.sort;
  r.sort((a,b)=>{
    if(sort==='dist'){ if(a._d==null)return 1; if(b._d==null)return -1; return a._d-b._d; }
    if(sort==='value') return (b.cost||0)-(a.cost||0) || (b.total||0)-(a.total||0);
    if(sort==='score') return (b.perf||0)-(a.perf||0) || (b.total||0)-(a.total||0);
    return (b.total||0)-(a.total||0);
  });
  return r;
}

/* ============ List render ============ */
function renderList(){
  const list=$("#list"), rows=filtered();
  $("#summary").innerHTML = `<span><b style="color:var(--txt)">${rows.length}</b>곳</span>`+
    (S.me?`<span>📍 현재위치 기준 정렬 가능</span>`:`<span>정렬: ${sortLabel()}</span>`);
  list.innerHTML="";
  if(!rows.length){ list.appendChild(el("div","empty",
    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg><div>조건에 맞는 슈퍼차저가 없어요</div>`)); return; }
  const frag=document.createDocumentFragment();
  rows.forEach((c,i)=>frag.appendChild(cardEl(c,i)));
  list.appendChild(frag);
}
function sortLabel(){ return {total:"총평점순",value:"가성비순",score:"충전점수순",dist:"가까운순"}[S.sort]; }

function cardEl(c,i){
  const card=el("div","card");
  card.style.setProperty("--barcol",scoreColor(c.total));
  const rank = i<3?`<div class="rankbadge top">${i+1}</div>`:`<div class="rankbadge">${i+1}</div>`;
  const dist = c._d!=null?`<span class="pill dist">📍 ${fmtDist(c._d)}</span>`:"";
  const free = c.isFree?`<span class="pill free">무료주차</span>`:"";
  const bars = [["충전",c.perf],["편의",c.amenity],["주차비",c.cost],["접근",c.access]]
    .map(([l,v])=>`<div class="barunit"><div class="bt">${l}</div><div class="bartrack"><div class="barfill" style="width:${(v||0)*10}%;background:${scoreColor(v||0)}"></div></div><div class="bv">${v!=null?v.toFixed(v%1?1:0):'-'}</div></div>`).join("");
  card.innerHTML=`
    <div class="top">
      ${rank}
      <div class="cardmain">
        <div class="cname">${c.title}</div>
        <div class="cmeta">
          <span class="pill ${kwClass(c.kwTier)}">${kwLabel(c)}</span>
          <span class="pill">🔌 ${c.stalls}</span>
          ${free}${dist}
          <span>${c.region}</span>
        </div>
      </div>
      <div class="scorebox">
        <div class="scoregrade" style="color:${gradeColor(c.total)}">${gradeOf(c.total)}</div>
        <div class="scorelbl">${c.total!=null?c.total.toFixed(1):'-'} <span style="opacity:.5">/10</span></div>
      </div>
    </div>
    <div class="bars">${bars}</div>
    <div class="cardbtns">
      <button class="btn-detail">상세보기</button>
      <button class="btn-nav"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s-7-6.3-7-11a7 7 0 0114 0c0 4.7-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/></svg>길안내</button>
    </div>`;
  card.querySelector(".btn-detail").onclick=()=>openSheet(c);
  card.querySelector(".cname").onclick=()=>openSheet(c);
  card.querySelector(".btn-nav").onclick=()=>openNav(c);
  return card;
}

/* ============ Navigation (티맵 / 카카오맵 / 네이버맵) ============ */
const NAV_SCHEME = {
  tmap:  c=>`tmap://route?goalname=${encodeURIComponent(c.name)}&goalx=${c.lng}&goaly=${c.lat}&rGoName=${encodeURIComponent(c.name)}&rGoX=${c.lng}&rGoY=${c.lat}`,
  kakao: c=>`kakaomap://route?ep=${c.lat},${c.lng}&by=CAR`,
  naver: c=>`nmap://route/car?dlat=${c.lat}&dlng=${c.lng}&dname=${encodeURIComponent(c.name)}&appname=kr.inspirain.supercharger`,
};
const NAV_WEB = {
  kakao: c=>`https://map.kakao.com/link/to/${encodeURIComponent(c.name)},${c.lat},${c.lng}`,
  naver: c=>`https://map.naver.com/p/directions/-/-/${c.lng},${c.lat},${encodeURIComponent(c.name)}/-/car`,
};
const NAV_LABEL = {tmap:"티맵", kakao:"카카오맵", naver:"네이버맵"};
function launchNav(prov,c){
  closeNav();
  const scheme=NAV_SCHEME[prov](c), web=NAV_WEB[prov]?NAV_WEB[prov](c):null;
  const start=performance.now();
  const iframe=document.createElement("iframe"); iframe.style.display="none"; iframe.src=scheme;
  document.body.appendChild(iframe);
  setTimeout(()=>iframe.remove(),1500);
  location.href=scheme;
  if(web){ setTimeout(()=>{ if(!document.hidden && performance.now()-start<2200){ location.href=web; } },1500); }
  else { toast(`${NAV_LABEL[prov]} 앱을 실행합니다`); }
}
function openNav(c){
  const ns=$("#navSheet");
  ns.innerHTML=`
    <div class="grabber"></div>

/* ===== Swipe to dismiss detail sheet (아래로/좌로 스와이프) ===== */
(function(){
  const sh=$("#sheet"); let ts=null;
  sh.addEventListener('touchstart',e=>{
    if(e.touches.length!==1) return;
    ts={x:e.touches[0].clientX,y:e.touches[0].clientY,st:sh.scrollTop,mode:null,d:0};
    sh.style.transition='none';
  },{passive:true});
  sh.addEventListener('touchmove',e=>{
    if(!ts) return;
    const dx=e.touches[0].clientX-ts.x, dy=e.touches[0].clientY-ts.y;
    if(ts.mode===null && (Math.abs(dx)>8||Math.abs(dy)>8)){
      if(Math.abs(dx)>Math.abs(dy) && dx<0) ts.mode='left';
      else if(dy>0 && ts.st<=0) ts.mode='down';
      else ts.mode='scroll';
    }
    if(ts.mode==='down'){ ts.d=Math.max(0,dy); sh.style.transform=`translateY(${ts.d}px)`; if(e.cancelable)e.preventDefault(); }
    else if(ts.mode==='left'){ ts.d=Math.min(0,dx); sh.style.transform=`translateX(${ts.d}px)`; if(e.cancelable)e.preventDefault(); }
  },{passive:false});
  sh.addEventListener('touchend',()=>{
    if(!ts) return;
    sh.style.transition='';
    if(ts.mode==='down' && ts.d>100) closeSheet();
    else if(ts.mode==='left' && ts.d<-80) closeSheet();
    else sh.style.transform='';
    ts=null;
  },{passive:true});
})();

function parkingCost(c){
  const raw=(c.parking||"").trim();
  if(!raw) return `<div class="iv">-</div>`;
  const fmt=s=>s.replace(/(\d{4,})\s*원/g,(m,n)=>Number(n).toLocaleString()+'원');
  const clauses=raw.split(/[\n,]+/).map(s=>s.trim()).filter(Boolean);
  const pay=[], free=[];
  clauses.forEach(cl=>{ (/무료|할인/.test(cl)?free:pay).push(fmt(cl)); });
  if(!pay.length && free.length===1) return `<div class="freebig">🆓 ${free[0]}</div>`;
  let h='';
  if(pay.length) h+=`<ul class="paylist">${pay.map(p=>`<li>${p}</li>`).join('')}</ul>`;

}

  $("#shop").innerHTML=`
    <div class="shop-hd">
      <div class="shop-title">🛍️ 테슬라 용품샵</div>
      <button class="shop-close" onclick="closeShop()">×</button>
    </div>
    <div class="shop-note">상품을 누르면 상세 설명 후 판매처로 이동합니다 · 파트너스 링크 포함</div>
    <div class="shop-cats">${chips}</div>
    <div class="shop-grid">${grid}</div>
    <div style="height:40px"></div>`;
}
function openProduct(id){
  const p=PRODUCTS.find(x=>x.id===id); if(!p) return;
  const feats=(p.detail||[]).map(d=>`<li>${d}</li>`).join('');
  const live=p.url&&p.url!=='#';
  $("#shop").innerHTML=`
    <div class="shop-hd">
      <button class="shop-back" onclick="renderShop()">‹ 목록</button>
      <div class="shop-title">상품 정보</div>
      <button class="shop-close" onclick="closeShop()">×</button>
    </div>
    <div class="prod-detail">
      <div class="pd-thumb" style="${prodThumb(p)}">${p.img?'':`<span>${p.emoji}</span>`}</div>
      <div class="pd-plat"><span class="plat ${platClass(p.platform)}">${p.platform}</span><span class="pd-cat">${p.cat}</span></div>
      <div class="pd-name">${p.name}</div>
      <div class="pd-brand">${p.brand}</div>
      <div class="pd-price">${p.price}</div>
      <div class="pd-desc">${p.desc}</div>
      <div class="pd-sec">주요 특징</div>
      <ul class="pd-feats">${feats}</ul>
    </div>
    <div class="pd-buy">
      <a class="pd-buybtn ${live?'':'disabled'}" id="pdBuy" href="${live?p.url:'javascript:void(0)'}" ${live?'target="_blank" rel="noopener"':''}>${p.platform}에서 구매하기 ›</a>
    </div>`;
  if(!live){ const b=$("#pdBuy"); if(b) b.onclick=()=>toast("레퍼럴 링크를 등록하면 판매처로 이동합니다"); }
  $("#shop").scrollTop=0;
}

/* ============ Map ============ */
let map, markerLayer, meMarker;
function initMap(){
  if(map) return;
  map=L.map('map',{zoomControl:true,attributionControl:false}).setView([36.5,127.8],7);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
    {maxZoom:19,subdomains:'abcd'}).addTo(map);
  markerLayer=L.layerGroup().addTo(map);
}
function renderMap(){
  initMap(); markerLayer.clearLayers();
  const rows=filtered().filter(c=>c.lat);
  const bounds=[];
  rows.forEach(c=>{
    const col=gradeColor(c.total);
    const sz = c.total>=8.0?26:22;
    const icon=L.divIcon({className:'',html:
      `<div class="marker-dot" style="width:${sz}px;height:${sz}px;background:${col}">${gradeOf(c.total)}</div>`,
      iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]});
    const m=L.marker([c.lat,c.lng],{icon}).addTo(markerLayer);
    m.bindPopup(`<div class="pop-name">${c.title}</div>
      <div class="pop-meta">${kwLabel(c)} · 🔌${c.stalls} · ${c.region}${c.geoApprox?' · <i>위치 근사</i>':''}</div>
      <div class="pop-btns">
        <button style="background:var(--card2);border:1px solid var(--line);color:var(--txt)" onclick="openById(${c.id})">상세</button>
        <button style="background:var(--red);color:#fff" onclick="openNavById(${c.id})">길안내</button>
      </div>`);
    bounds.push([c.lat,c.lng]);
  });
  if(S.me){
    meMarker=L.marker(S.me,{icon:L.divIcon({className:'',html:'<div class="me-dot"></div>',iconSize:[18,18],iconAnchor:[9,9]})}).addTo(markerLayer);
    bounds.push(S.me);
  }
  const sig=[S.region,[...S.kw].join(''),S.free,S.val,S.q].join('|');
  if(bounds.length && map._sig!==sig){ map.fitBounds(bounds,{padding:[40,40],maxZoom:S.region?13:12}); map._sig=sig; }
}
function openById(id){ openSheet(DATA.find(c=>c.id===id)); }

/* ============ Geolocation ============ */
const GEO_ON=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/></svg>내 위치`;
const GEO_OFF=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><circle cx="12" cy="12" r="4"/></svg>내 위치`;
function locate(auto){
  if(!navigator.geolocation){ if(!auto) toast("위치 기능을 지원하지 않아요"); return; }
  const b=$("#geoBtn"); b.innerHTML="측정중…";
  navigator.geolocation.getCurrentPosition(p=>{
    S.me=[p.coords.latitude,p.coords.longitude];
    b.classList.add("on"); b.innerHTML=GEO_ON;
    S.sort="dist"; $("#sortSel").value="dist";
    toast("현재 위치 기준 가까운순으로 정렬했어요");
    render();
    if(S.view==='map' && map){ map.setView(S.me,11); }
  },err=>{
    b.classList.remove("on"); b.innerHTML=GEO_OFF;
    if(!auto) toast(err.code===1?"위치 권한이 거부되었어요":"위치를 찾지 못했어요");
    else if(err.code===1) toast("‘내 위치’를 누르면 가까운순으로 정렬돼요");
  },{enableHighAccuracy:true,timeout:10000,maximumAge:60000});
}

/* ============ Controls ============ */
function render(){
  if(S.view==='list'){ $("#list").style.display=""; $("#mapWrap").style.display="none"; renderList(); }
  else { $("#list").style.display="none"; $("#mapWrap").style.display=""; $("#summary").innerHTML=`<span>지도에 <b style="color:var(--txt)">${filtered().filter(c=>c.lat).length}</b>곳 표시</span>`;
    setTimeout(()=>{renderMap(); map.invalidateSize();},50); }
}
function bind(){
  // regions
  const regs=[...new Set(DATA.map(c=>c.region))];
  const rs=$("#regionSel"); regs.forEach(r=>{const o=el("option");o.value=r;o.textContent=r;rs.appendChild(o);});
  rs.onchange=e=>{S.region=e.target.value; render();};
  $("#sortSel").onchange=e=>{S.sort=e.target.value; render();};
  document.querySelectorAll(".chip.kw").forEach(ch=>ch.onclick=()=>{
    const k=ch.dataset.kw; ch.classList.toggle("active");
    S.kw.has(k)?S.kw.delete(k):S.kw.add(k); render(); });
  const fc=$('.chip.free'); fc.onclick=()=>{S.free=!S.free; fc.classList.toggle("active",S.free); render();};
  const vc=$('.chip.val'); vc.onclick=()=>{S.val=S.val?0:8; vc.classList.toggle("active",!!S.val); render();};
  $("#search").oninput=e=>{S.q=e.target.value.trim(); render();};
  $("#geoBtn").onclick=()=>locate(false);
  $("#shopBtn").onclick=openShop;
  document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    t.classList.add("active"); S.view=t.dataset.view; render();
  });
}
bind(); render(); locate(true);
</script>
</body>
